<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" fill="none" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">Nano Fusion</title>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c9a832"/>
      <stop offset="50%"  stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c9a832"/>
    </linearGradient>
    <filter id="s" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- NANO -->
  <text
    x="2" y="40"
    font-family="Georgia,'Times New Roman',serif"
    font-size="42"
    font-weight="700"
    letter-spacing="0.02em"
    fill="#ffffff"
    filter="url(#s)"
    style="text-rendering:geometricPrecision"
  >NANO</text>

  <!-- gold dot separator -->
  <circle cx="148" cy="30" r="3" fill="url(#gold)" filter="url(#s)"/>

  <!-- FUSION -->
  <text
    x="160" y="40"
    font-family="Georgia,'Times New Roman',serif"
    font-size="42"
    font-weight="400"
    letter-spacing="0.02em"
    fill="rgba(255,255,255,0.90)"
    filter="url(#s)"
    style="text-rendering:geometricPrecision"
  >FUSION</text>

</svg>
